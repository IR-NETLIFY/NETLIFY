name: Auto Domain Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run Monitor and Generate Sub
        run: |
          python monitor.py
          python generator.py # اضافه کردن این خط برای آپدیت همزمان ساب

      - name: Commit and Push all changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-switch: Domain updated and Sub regenerated"
            git push
          fi
